spring:
  application:
    name: skyluma-backend

skyluma:
  cors:
    allowed-origins:
      - http://localhost:4200

openweather:
  base-url: https://api.openweathermap.org/data/3.0
  api-key: ${OPENWEATHER_API_KEY:}
  units: metric
  language: en

openmeteo:
  base-url: https://api.open-meteo.com